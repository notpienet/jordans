<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Membership</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="nike.png">
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #e44a02;
        }
        body {
            background:
                radial-gradient(circle at 80% 50%, rgba(255, 77, 0, 0.422), transparent 60%),
                linear-gradient(90deg, rgba(0, 0, 0, 0.97), rgba(0, 0, 0, 0.8)),
                url("grid.png"),
                #000;
            background-size: cover, cover, 2000px 2000px, cover;
            color: white;
            font-family: "Exo 2", sans-serif;
        }
        h1 {
            font-family: "Bowlby One", sans-serif;
        }
        .accent {
            color: var(--accent);
        }
        .header {
            text-align: center;
            padding: 60px 20px 20px;
        }
        .header p {
            color: rgba(255,255,255,0.75);
        }
        .form-card {
            max-width: 600px;
            margin: 40px auto;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 35px;
        }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(228,74,2,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .btn-custom {
            background: var(--accent);
            border: none;
            font-weight: bold;
            padding: 10px 25px;
        }
        .btn-custom:hover {
            background: #ff5a1f;
        }
        .form-check-input:checked {
            background-color: var(--accent);
            border-color: var(--accent);
        }
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0));
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 5vh;
        }
        .nav-inner {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 3vw;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .nav-left {
            justify-content: flex-end;
            margin-right: 10px;
        }
        .nav-right {
            justify-content: flex-start;
            margin-left: 10px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }
        .nav-links a:hover {
            color: var(--accent);
        }
        .navbar-logo {
            height: 40px;
        }
        body {
            padding-top: 90px;
        }
    </style>
</head>

<body>
    <nav class="top-navbar">
        <div class="nav-inner">
            <div class="nav-links nav-left">
                <a href="./index.html#about">About</a>
                <a href="./index.html#specs">Specs</a>
                <a href="./index.html#advantages">Advantages</a>
            </div>

            <a href="./index.html#top" class="nav-logo-link">
                <img src="nike.png" alt="Logo" class="navbar-logo">
            </a>

            <div class="nav-links nav-right">
                <a href="./index.html#testimonials">Reviews</a>
                <a href="./index.html#footer">Contact</a>
                <a href="./form.html#">Purchase</a>
            </div>
        </div>
    </nav>
    <div class="header">
        <h1>JOIN OUR <span class="accent">MEMBERSHIP</span></h1>
        <p>Have a chance to win the brand new Air Jordan XXXVIII</p>
    </div>
    <div class="form-card">
        <form action="submit.html">

            <div class="mb-4">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Enter your name" name="name" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" name="email" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password" name="pswd" required>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label" for="remember">
                    Remember me
                </label>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-custom">Join Now</button>
            </div>

        </form>

        <div class="footer-note">
            By joining, you agree to our terms and conditions.
        </div>
    </div>
</body>
</html>
